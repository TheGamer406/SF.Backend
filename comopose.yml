services:

  sf.backend:
    image: ghcr.io/sf-backenduser/sf.backend:latest
    container_name: SF.BackendCS
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
    networks:
      - SF-D-Network

  watchtower:
    image: containrrr/watchtower
    container_name: SF.Watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /root/.docker/config.json:/config.json
    command: --interval 30 SF.Backend
    networks:
      - SF-D-Network

networks:
  SF-D-Network:
    external: true
